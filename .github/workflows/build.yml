name: Build & Push Docker Images

# Manual deployment workflow - images tagged with SHA only (no 'latest')

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      ref:
        description: "Branch or tag to deploy (leave empty for current branch)"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare test environment
        working-directory: src
        run: |
          cp .env.example .env.testing
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env.testing
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=:memory:/' .env.testing
          php artisan key:generate --env=testing

      - name: Run PHPStan (Static Analysis)
        working-directory: src
        run: ./vendor/bin/phpstan analyse --memory-limit=2G
        continue-on-error: false

      - name: Run PHPUnit Tests
        working-directory: src
        run: ./vendor/bin/phpunit
        continue-on-error: false

      - name: Check Composer dependencies for known security vulnerabilities
        working-directory: src
        run: composer audit

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: quality-checks

    environment: ${{ inputs.environment }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get deployment ref info
        id: ref_info
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            DEPLOY_REF="${{ inputs.ref }}"
          else
            DEPLOY_REF="${{ github.ref_name }}"
          fi
          
          # Get current commit SHA
          DEPLOY_SHA=$(git rev-parse HEAD)
          
          # Check if it's a tag
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            REF_TYPE="tag"
          else
            REF_TYPE="branch"
          fi
          
          echo "deploy_ref=$DEPLOY_REF" >> $GITHUB_OUTPUT
          echo "deploy_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
          echo "ref_type=$REF_TYPE" >> $GITHUB_OUTPUT

      - name: Display deployment info
        run: |
          echo "🚀 Deploying to: ${{ inputs.environment }}"
          echo "📦 Ref: ${{ steps.ref_info.outputs.deploy_ref }} (${{ steps.ref_info.outputs.ref_type }})"
          echo "🔖 Commit SHA: ${{ steps.ref_info.outputs.deploy_sha }}"
          
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "⚠️  WARNING: Deploying to PRODUCTION environment"
          fi

      - name: Validate branch restrictions
        run: |
          ENV="${{ inputs.environment }}"
          REF_TYPE="${{ steps.ref_info.outputs.ref_type }}"
          DEPLOY_REF="${{ steps.ref_info.outputs.deploy_ref }}"
          
          if [ "$ENV" = "production" ]; then
            if [ "$REF_TYPE" = "branch" ] && [ "$DEPLOY_REF" != "main" ]; then
              echo "❌ Production can only deploy from 'main' branch or tags"
              echo "   Current: $DEPLOY_REF (branch)"
              exit 1
            fi
          elif [ "$ENV" = "staging" ]; then
            if [ "$REF_TYPE" = "branch" ] && [ "$DEPLOY_REF" != "staging" ]; then
              echo "❌ Staging can only deploy from 'staging' branch or tags"
              echo "   Current: $DEPLOY_REF (branch)"
              exit 1
            fi
          fi
          
          echo "✅ Branch validation passed"

      - name: Set environment metadata
        id: meta
        run: |
          echo "app_env=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ steps.ref_info.outputs.deploy_sha }}" >> $GITHUB_OUTPUT

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.0.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner (base check)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'docker/php-fpm/Dockerfile'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
        continue-on-error: ${{ steps.meta.outputs.app_env != 'production' }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php-fpm/Dockerfile
          target: server_deployment_php
          push: true
          tags: ${{ env.IMAGE_BASE }}-app:${{ steps.meta.outputs.image_tag }}
          build-args: |
            user=asif
            uid=1412
          cache-from: type=gha,scope=app-${{ steps.meta.outputs.app_env }}
          cache-to:   type=gha,scope=app-${{ steps.meta.outputs.app_env }},mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          target: server_deployment_nginx
          push: true
          tags: ${{ env.IMAGE_BASE }}-nginx:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha,scope=nginx-${{ steps.meta.outputs.app_env }}
          cache-to:   type=gha,scope=nginx-${{ steps.meta.outputs.app_env }},mode=max

      - name: Scan app image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}-app:${{ steps.meta.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
        continue-on-error: ${{ steps.meta.outputs.app_env != 'production' }}

      - name: Scan nginx image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}-nginx:${{ steps.meta.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
        continue-on-error: ${{ steps.meta.outputs.app_env != 'production' }}

      - name: Update image tag in kustomize overlay
        run: |
          cd k8s/overlays/${{ steps.meta.outputs.app_env }}
          kustomize edit set image \
            passport_token_auth-app=${{ env.IMAGE_BASE }}-app:${{ steps.meta.outputs.image_tag }} \
            passport_token_auth-nginx=${{ env.IMAGE_BASE }}-nginx:${{ steps.meta.outputs.image_tag }}

      - name: Validate kustomize build
        run: |
          echo "Validating kustomize overlay for ${{ steps.meta.outputs.app_env }}..."
          kustomize build k8s/overlays/${{ steps.meta.outputs.app_env }} > /dev/null
          echo "✅ Kustomize overlay is valid"

      - name: Commit updated kustomization to Git
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update ${{ steps.meta.outputs.app_env }} image to ${{ steps.ref_info.outputs.deploy_sha }} [skip ci]"
          file_pattern: k8s/overlays/${{ steps.meta.outputs.app_env }}/kustomization.yaml
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false
          branch: ${{ inputs.environment == 'production' && 'main' || (inputs.environment == 'staging' && 'staging' || 'dev') }}

      - name: Deployment summary
        run: |
          echo "✅ Git updated successfully"
          echo ""
          echo "Images deployed:"
          echo "  • ${{ env.IMAGE_BASE }}-app:${{ steps.meta.outputs.image_tag }}"
          echo "  • ${{ env.IMAGE_BASE }}-nginx:${{ steps.meta.outputs.image_tag }}"
          echo ""
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "🚀 Dev: ArgoCD will auto-sync this deployment"
          else
            echo "📋 ${{ inputs.environment }}: Go to ArgoCD and click 'Sync' to deploy"
          fi

      - name: Tag deployment note
        if: steps.ref_info.outputs.ref_type == 'tag'
        run: |
          echo "ℹ️  Tag deployment: ${{ steps.ref_info.outputs.deploy_ref }}"
          echo "   Kustomization committed to: ${{ inputs.environment == 'production' && 'main' || (inputs.environment == 'staging' && 'staging' || 'dev') }}"
