apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  template:
    spec:
      initContainers:
        - name: run-migrations
          volumeMounts:
            - mountPath: /var/www/.env
              name: app-env
              subPath: .env
      containers:
        - name: app
          env:
            - name: APP_ENV
              value: production
          volumeMounts:
            - mountPath: /var/www/.env
              name: app-env
              subPath: .env
      volumes:
        - name: app-env
          configMap:
            name: app-env
            items:
              - key: .env.kind
                path: .env
