apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - app-hpa.yaml
  # Add production-specific resources:
  # - app-env-configmap.yaml
  # - app-secret.yaml       ← inject from CI/Vault, not committed to git
  # - nginx-hpa.yaml

images:
  - name: passport_token_auth-app
    newName: passport_token_auth-app
    newTag: latest
  - name: passport_token_auth-nginx
    newName: passport_token_auth-nginx
    newTag: latest

