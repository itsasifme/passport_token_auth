apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- app-env-configmap.yaml
- app-secret.yaml
- app-hpa.yaml
- nginx-hpa.yaml
- storageclass.yaml

images:
- name: passport_token_auth-app
  newName: ghcr.io/itsasifme/passport_token_auth-app
  newTag: cc6e50f91a3da52ac6ccea40d957dcf3c29c510f
- name: passport_token_auth-nginx
  newName: ghcr.io/itsasifme/passport_token_auth-nginx
  newTag: cc6e50f91a3da52ac6ccea40d957dcf3c29c510f

patches:
- path: app-image-patch.yaml
  target:
    kind: Deployment
    name: app
# EKS Auto Mode's gp2 (ebs.csi.aws.com) can't actually provision here — its node
# component can't schedule on Auto Mode nodes. Use the working auto-ebs-sc instead.
# No target: needed here — each document in the file is matched to its base PVC by name.
- path: pvc-storageclass-patch.yaml
