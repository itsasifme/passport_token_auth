apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - app-env-configmap.yaml
  - app-secret.yaml
  - app-hpa.yaml
  - nginx-hpa.yaml

images:
  - name: passport_token_auth-app
    newName: passport_token_auth-app
    newTag: latest
  - name: passport_token_auth-nginx
    newName: passport_token_auth-nginx
    newTag: latest

patches:
  - path: app-image-patch.yaml
    target:
      kind: Deployment
      name: app
  # EKS has no default StorageClass — pin both PVCs to the one that actually exists (gp2).
  # No target: needed here — each document in the file is matched to its base PVC by name.
  - path: pvc-storageclass-patch.yaml
