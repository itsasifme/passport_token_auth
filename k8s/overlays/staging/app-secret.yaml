apiVersion: v1
kind: Secret
metadata:
  labels:
    app: app
  name: app-secret
type: Opaque
stringData:
  # PLACEHOLDER: generate with `php artisan key:generate --show` against the staging .env.
  APP_KEY: "CHANGE_ME"
  # PLACEHOLDER: real staging DB root/user password.
  DB_PASSWORD: "CHANGE_ME"
  # PLACEHOLDER: real staging mail credentials.
  MAIL_USERNAME: "CHANGE_ME"
  MAIL_PASSWORD: "CHANGE_ME"
