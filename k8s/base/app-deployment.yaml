apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app
  name: app
spec:
  selector:
    matchLabels:
      app: app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: app
    spec:
      # Fresh PersistentVolumes (e.g. real cloud block storage like EBS) mount as
      # root:root by default. fsGroup makes Kubernetes set group ownership on mounted
      # volumes to match the app user (asif, gid 1412), so it can write its own logs.
      securityContext:
        fsGroup: 1412
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 mysql 3306; do echo waiting for mysql; sleep 2; done;']
        - name: run-migrations
          image: passport_token_auth-app:latest
          imagePullPolicy: IfNotPresent
          workingDir: /var/www/
          command: ['sh', '-c', 'php artisan config:cache && php artisan migrate --force']
          envFrom:
            - secretRef:
                name: app-secret
          volumeMounts:
            - mountPath: /var/www/.env
              name: app-env
              subPath: .env
      containers:
        - name: app
          image: passport_token_auth-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: fpm
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - mountPath: /var/www/.env
              name: app-env
              subPath: .env
            - mountPath: /var/www/storage/logs/supervisor
              name: app-supervisor-logs
          env:
            - name: APP_ENV
              value: production
          envFrom:
            - secretRef:
                name: app-secret
          workingDir: /var/www/
          # php-fpm speaks FastCGI, not HTTP, so a TCP check on its listen port
          # is the simplest reliable signal that the process is up and accepting connections.
          livenessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: fpm
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"   # Minimum memory guaranteed for PHP/Laravel
              cpu: "100m"
            limits:
              memory: "512Mi"   # Max memory allowed before an OOMKilled crash
              cpu: "500m"
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: .env.local
                path: .env
            name: app-env
          name: app-env
        - name: app-supervisor-logs
          persistentVolumeClaim:
            claimName: app-supervisor-logs