apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  parentRefs:
    - name: passport-token-auth-gateway
  # PLACEHOLDER: real hostname(s) — override per environment via an overlay patch
  # (e.g. dev.example.com, staging.example.com, app.example.com).
  hostnames:
    - placeholder.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx
          port: 8000

